<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sunara Energy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
    }

    header {
      background: #0a192f;
      color: white;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    header span {
      color: #00c2ff;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
    }

    .hero {
      background: linear-gradient(to right, #001f3f, #003566);
      color: white;
      padding: 120px 20px;
      text-align: center;
    }

    .hero h2 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 20px;
      margin-bottom: 30px;
    }

    .hero button {
      padding: 15px 30px;
      font-size: 16px;
      background: #00c2ff;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .plans {
      padding: 80px 20px;
      text-align: center;
    }

    .plan-container {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      margin-top: 40px;
    }

    .plan {
      background: white;
      padding: 30px;
      width: 280px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .plan h3 {
      margin-top: 0;
    }

    .plan button {
      margin-top: 20px;
      padding: 10px 20px;
      background: #003566;
      color: white;
      border: none;
      cursor: pointer;
    }

    footer {
      background: #0a192f;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 60px;
    }
  </style>
</head>
<body>

<header>
  <h1>Sunara <span>Energy</span></h1>
  <nav>
    <a href="#">Plans</a>
    <a href="#">Why Us</a>
    <a href="#">Sign Up</a>
  </nav>
</header>

<section class="hero">
  <h2>Energy Without Limits</h2>
  <p>Reliable, affordable electricity for Texas homes.</p>
  <button>View Plans</button>
</section>

<section class="plans">
  <h2>Our Plans</h2>
  <div class="plan-container">
    <div class="plan">
      <h3>Starter Plan</h3>
      <p>$0.11/kWh</p>
      <button>Select Plan</button>
    </div>

    <div class="plan">
      <h3>Premium Plan</h3>
      <p>$0.09/kWh</p>
      <button>Select Plan</button>
    </div>
  </div>
</section>

<footer>
  © 2026 Sunara Energy. All Rights Reserved.
</footer>

</body>
</html>
